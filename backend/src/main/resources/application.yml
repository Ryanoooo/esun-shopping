server:
  port: 8080

spring:
  application:
    name: esun-shopping-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/esun_shopping}
    username: ${SPRING_DATASOURCE_USERNAME:esun_user}
    password: ${SPRING_DATASOURCE_PASSWORD:esun_pass}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Taipei

jwt:
  secret: ${JWT_SECRET:esun-shopping-secret-key-change-in-production-at-least-32-chars}
  expiration: ${JWT_EXPIRATION:86400000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}